services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rinku-payroll-app
    container_name: rinku-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - rinku-network

  db:
    image: postgres:15-alpine
    container_name: rinku-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rinku_payroll
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - ./docker/postgres:/var/lib/postgresql/data
    networks:
      - rinku-network

  nginx:
    image: nginx:alpine
    container_name: rinku-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - rinku-network

networks:
  rinku-network:
    driver: bridge
